name: l2d_flutter_plugin
description: >-
  Flutter FFI plugin for Live2D Cubism SDK. Provides Dart bindings to the
  Cubism Core C API and Dart reimplementations of the Cubism Framework.
version: 0.1.0
homepage: https://github.com/thynetruly/l2d_flutter

environment:
  sdk: ^3.7.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.3

dev_dependencies:
  ffigen: ^13.0.0
  test: ^1.25.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  benchmark_harness: ^2.3.1
  vm_service: ^14.2.1

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
